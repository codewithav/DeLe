<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeLe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">DeLe</div>
        <div class="Listing">
            <a href="#">Browse</a>
            <a href="#">List Item</a>
            <button class="btn-primary" style="padding: 5px 15px; margin-left: 10px;">Login</button>
        </div>
    </nav>

    <header class="main">
        <h1>Don't Buy. <span class="highlight">DeLe</span> it.</h1>
        <p>Rent gadgets, tools, and gear from your neighbors.</p>
        <div class="search-box">
            <input type="text" id="search" placeholder="What do you need? (e.g., Camera, Projector)">
            <button onclick="filterItems()">Search</button>
        </div>
    </header>

    <main class="container">
        <h2>Popular Rentals</h2>
        <div id="lists" class="listings">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8ZnVybml0dXJlfGVufDB8fDB8fHww" alt="Chair and Lamp">
                <div class="card-body">
                    <h3 class="card-title">Chair and Lamp</h3>
                    <p class="card-price">$15 / day</p>
                    <button class="card-btn" onclick="openModal('Cordless Drill', 15)">Book Now</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y2FtZXJhJTIwZHNscnxlbnwwfHwwfHx8MA%3D%3D" alt="DSLR Camera">
                <div class="card-body">
                    <h3 class="card-title">DSLR Camera</h3>
                    <p class="card-price">$45 / day</p>
                    <button class="card-btn" onclick="openModal('DSLR Camera', 45)">Book Now</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1631635589499-afd87d52bf64?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8Y2FtcGluZyUyMHRlbnR8ZW58MHx8MHx8fDA%3D" alt="Camping Tent">
                <div class="card-body">
                    <h3 class="card-title">Camping Tent (4 Person)</h3>
                    <p class="card-price">$25 / day</p>
                    <button class="card-btn" onclick="openModal('Camping Tent (4 Person)', 25)">Book Now</button>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1528395874238-34ebe249b3f2?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8cHJvamVjdG9yfGVufDB8fDB8fHww" alt="Projector">
                <div class="card-body">
                    <h3 class="card-title">Projector 1080p</h3>
                    <p class="card-price">$30 / day</p>
                    <button class="card-btn" onclick="openModal('Projector 1080p', 30)">Book Now</button>
                </div>
            </div>

        </div>
    </main>
</body>

</html>
